<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Monitoreo ALPR</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #2c3e50; color: white; }
        .robo-row { background-color: #ffeaea !important; color: #d00000; font-weight: bold; }
        
        /* Estilo de la alerta roja parpadeante */
        #alerta-robo {
            display: none;
            background: #e74c3c;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 8px;
            margin-bottom: 20px;
            animation: parpadeo 1s infinite;
        }
        @keyframes parpadeo {
            0% { opacity: 1; }
            50% { opacity: 0.5; background: #c0392b; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="alerta-robo">⚠️ ¡ALERTA! DETECCIÓN DE VEHÍCULO CON REPORTE DE ROBO ⚠️<br><span id="placa-robada"></span></div>
    
    <h1>Monitoreo de Accesos (En vivo)</h1>
    <table>
        <thead>
            <tr>
                <th>ID / Hora</th>
                <th>Placa Detectada</th>
                <th>Estatus</th>
            </tr>
        </thead>
        <tbody id="tabla-body">
            <tr><td colspan="3" style="text-align:center;">Esperando datos...</td></tr>
        </tbody>
    </table>
</div>

<script>
    // Función que consulta el PHP y pinta la tabla
    async function actualizarDatos() {
        try {
            const respuesta = await fetch('fetch3.php');
            const lecturas = await respuesta.json();
            
            const tbody = document.getElementById('tabla-body');
            const alerta = document.getElementById('alerta-robo');
            const spanPlaca = document.getElementById('placa-robada');
            
            tbody.innerHTML = '';
            let alertaActiva = false;

            lecturas.forEach(fila => {
                let tr = document.createElement('tr');
                let estatus = "✅ OK";
                
                if(fila.es_robo == 1) {
                    tr.className = "robo-row";
                    estatus = "🚨 REPORTE DE ROBO";
                    alertaActiva = true;
                    spanPlaca.innerText = "Placa: " + fila.placa;
                }

                tr.innerHTML = `
                    <td>${fila.fecha_hora}</td>
                    <td style="font-size: 1.2em; letter-spacing: 2px;">${fila.placa}</td>
                    <td>${estatus}</td>
                `;
                tbody.appendChild(tr);
            });

            // Control visual de la alerta
            if(alertaActiva) {
                alerta.style.display = 'block';
            } else {
                alerta.style.display = 'none';
            }

        } catch (error) {
            console.error("Error al obtener datos:", error);
        }
    }

    // Ejecutar cada 5 segundos
    setInterval(actualizarDatos, 3000);
    // Ejecutar inmediatamente al cargar la página
    actualizarDatos();
</script>

</body>
</html>
